<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../imgs/logo@2x.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../CSS/main.css">
    <title>CloudWatch | Log in</title>
</head>
<body class="bg-dark">
    <main class="vh-100">
        <div class="w-100 h-100 d-flex justify-content-center align-items-center position-relative overflow-hidden">
            <form action="" class="Login col-11 col-md-8 col-lg-6 col-xl-4 p-3 shadow border border-info-subtle form-Login position-absolute form-backe rounded-4">
                <div class="h2 text-white text-center">Login</div>
                <label for="email" class="text-white fw-bold ms-3 mb-1">Email :</label>
                <input class="form-control py-2 rounded-pill px-3 text-white bg-main" type="email" name="email" id="email" placeholder="ex@examples.com">
                <label for="password" class="text-white fw-bold ms-3 mt-2 mb-1">Password :</label>
                <input class="form-control py-2 rounded-pill px-3 text-white bg-main" type="password" name="password" id="password" placeholder="!Password1">
                <button type="submit" class="btn btn-info rounded-pill my-2 px-5">Login</button>
                <a href="#" class="text-center d-block">I don't have an account !</a>
            </form>
            <form action="" class="Register col-11 col-md-8 col-lg-6 col-xl-4 p-3 shadow border border-info-subtle form-Register position-absolute rounded-4">
                <div class="h2 text-white text-center">Register</div>
                <label for="Name" class="text-white fw-bold ms-3 mb-1">Name :</label>
                <input type="text" name="Name" id="Name" class="form-control py-2 rounded-pill px-3 text-white mb-2 bg-main" placeholder="Kareem">
                <label for="email" class="text-white fw-bold ms-3 mb-1">Email :</label>
                <input type="email" name="email" id="emailRegister" class="form-control py-2 rounded-pill px-3 text-white mb-2 bg-main" placeholder="ex@examples.com">
                <label for="Phone" class="text-white fw-bold ms-3 mb-1">Phone Number :</label>
                <input type="tel" name="Phone" id="Phone" class="form-control py-2 rounded-pill px-3 text-white mb-2 bg-main" placeholder="012xxxxxxx1">
                <label for="password" class="text-white fw-bold ms-3 mb-1">Password :</label>
                <input type="password" name="password" id="passwordRegister" class="form-control py-2 rounded-pill px-3 text-white mb-2 bg-main" placeholder="!Password1">
                <label for="password" class="text-white fw-bold ms-3 mb-1">Confirm Password :</label>
                <input type="password" name="ConfirmPassword" id="ConfirmPassword" class="form-control py-2 rounded-pill px-3 text-white mb-2 bg-main" placeholder="!Password1">
                <button type="submit" class="btn btn-success rounded-pill my-2 px-5">Register</button>
                <a href="#" class="text-center d-block">I have an account</a>
            </form>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="../JS/Forms.js"></script>
</body>
</html>
